config:
  colony:
    ambient_worker_count: 0
    worker_lifespan_ticks: 600
    queen_egg_food_cost: 2
    max_workers_per_hive: 1

startup:
  paused: true
  reset_world: false
  load_gamestate: "experiment 1"
  sc_commands:
    - /sc set queen.eggs 1
    - /sc kill @e[type=worker,hive=none]
    - /sc game unpause

experiment:
  debug_log: true
  terminate_server_on_completion: true
  randomize_seed_from_datetime: true
  tick_millis: 1
  analysis:
    metrics:
      - simulation_length
      - final_day
      - final_tick
      - found_food
      - delivered_food
      - delivered_food_per_day
      - selected_move_count
      - steps_to_nth_food
      - steps_to_nth_queen
  visualizations:
    - type: cumulative_record
      name: food-pickups-by-condition
      mode: staircase
      event: found_food
      x_axis: tick
      group_by: condition
      output: food-pickups-by-condition.png
      title: "Cumulative Food Pickups by Condition"
      x_label: "Tick"
      y_label: "Cumulative Food Pickups"
    - type: cumulative_record
      name: smooth-food-pickups-by-condition
      mode: smooth
      event: found_food
      x_axis: tick
      group_by: condition
      output: smooth-food-pickups-by-condition.png
      title: "Cumulative Food Pickups by Condition"
      x_label: "Tick"
      y_label: "Cumulative Food Pickups"
  conditions:
    - name: baseline
      runs: 2
    - name: longer-life
      runs: 2
      config:
        colony:
          worker_lifespan_ticks: 900
  stop_conditions:
    or:
      - max_day: 60
      - and:
        - all_workers_dead: true
        - no_eggs: true
